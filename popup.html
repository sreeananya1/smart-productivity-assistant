<!DOCTYPE html>
<html>
<head>
  <title>Eye Break Timer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      width: 200px;
    }
    #timer {
      font-size: 32px;
      margin: 20px 0;
      color: #007bff;
    }
    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h3>20-20-20 Rule</h3>
  <p>Take a 20-sec break!</p>
  <div id="timer">20</div>
  <button id="start">Start 20-sec Timer</button>

  <script src="popup.js"></script>
</body>
</html>
